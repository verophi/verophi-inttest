name: Daily Refresh (Layer 2)

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: baseline-refresh
  cancel-in-progress: false

jobs:
  refresh:
    uses: ./.github/workflows/refresh.yml
    with:
      pr-commit-message: "chore: refresh E2E baseline from scheduled drift run"
      artifact-name: daily-refresh-results
      pr-body: |
        Automated baseline refresh from a scheduled drift run. Drift
        verification passed on both platforms; this diff reflects upstream
        CVE or score changes, not a regression.
    secrets: inherit

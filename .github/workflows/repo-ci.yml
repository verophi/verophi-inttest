name: Repo CI

# Hygiene for this repo's own Go code (the verify tool and the expectations
# parser): build, unit tests, formatting, vet. This is not the integration test;
# it only guards that the verification tooling itself compiles and passes its
# unit tests when this repo changes.
#
# The integration layers (regression, daily-refresh, weekly-refresh) run on
# schedules and dispatches, not here.
#
# Layout: go.mod replaces github.com/verophi/verophi with ../verophi, so verophi
# is checked out as a sibling and Go commands run from the verophi-inttest dir.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: repo-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: verophi-inttest
    steps:
      - name: Checkout verophi-inttest
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: verophi-inttest

      - name: Checkout verophi (sibling for ../verophi replace)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: verophi/verophi
          path: verophi

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: verophi-inttest/go.mod
          cache-dependency-path: verophi-inttest/go.sum

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -count=1 ./...

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

name: Weekly Refresh (Layer 3)

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: baseline-refresh
  cancel-in-progress: false

jobs:
  seed:
    name: Clean-slate seed (Gitlab/Github)
    runs-on: ubuntu-latest
    env:
      VEROPHI_IMAGE: ${{ vars.VEROPHI_IMAGE || 'ghcr.io/verophi/verophi:latest' }}
      VEROPHI_TRIVY_IMAGE: ${{ vars.VEROPHI_TRIVY_IMAGE || 'ghcr.io/verophi/verophi-trivy:latest' }}
      GLAB_VERSION: "1.108.0"
    steps:
      - name: Mint verophi-fixtures token (recreate github fixture PRs)
        id: fixtures_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.VEROPHI_FIXTURES_APP_CLIENT_ID }}
          private-key: ${{ secrets.VEROPHI_FIXTURES_APP_PRIVATE_KEY }}
          owner: verophi
          repositories: test-fixtures

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: verophi-inttest

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: verophi/test-fixtures
          path: test-fixtures

      - name: Install glab
        run: |
          curl -sfL -o /tmp/glab.tar.gz \
            "https://gitlab.com/gitlab-org/cli/-/releases/v${GLAB_VERSION}/downloads/glab_${GLAB_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/glab.tar.gz -C /tmp
          sudo install /tmp/bin/glab /usr/local/bin/glab

      - name: Seed (Gitlab/Github)
        working-directory: verophi-inttest
        env:
          RENOVATE_GITHUB_TOKEN: ${{ steps.fixtures_token.outputs.token }}
          RENOVATE_GITLAB_TOKEN: ${{ secrets.RENOVATE_GITLAB_TOKEN }}
          RENOVATE_GITHUB_COM_TOKEN: ${{ steps.fixtures_token.outputs.token }}
        run: make seed-all

  refresh:
    needs: seed
    uses: ./.github/workflows/refresh.yml
    with:
      pr-commit-message: "chore: refresh E2E baseline from weekly clean-slate cycle"
      artifact-name: weekly-refresh-results
      pr-body: |
        Automated baseline refresh from the weekly clean-slate cycle. Fixture
        MRs/PRs were recreated with Renovate on both platforms and drift
        verification passed; this diff reflects upstream CVE, Renovate, or
        score changes, not a regression.
    secrets: inherit

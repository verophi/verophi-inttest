name: Baseline Refresh (reusable)

on:
  workflow_call:
    inputs:
      pr-commit-message:
        type: string
        required: true
      pr-body:
        type: string
        required: true
      artifact-name:
        type: string
        required: true

permissions:
  contents: read

env:
  VEROPHI_IMAGE: ${{ vars.VEROPHI_IMAGE || 'ghcr.io/verophi/verophi:latest' }}
  VEROPHI_TRIVY_IMAGE: ${{ vars.VEROPHI_TRIVY_IMAGE || 'ghcr.io/verophi/verophi-trivy:latest' }}

jobs:
  refresh:
    name: Drift check + baseline refresh (Gitlab/Github)
    runs-on: ubuntu-latest
    steps:
      - name: Mint verophi-ci token (devtools checkout + baseline PR)
        id: ci_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.VEROPHI_CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.VEROPHI_CI_APP_PRIVATE_KEY }}
          owner: verophi
          repositories: |
            verophi-inttest
            verophi-devtools

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: verophi-inttest

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: verophi/verophi
          path: verophi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: verophi/verophi-devtools
          token: ${{ steps.ci_token.outputs.token }}
          path: verophi-devtools

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: verophi/test-fixtures
          path: test-fixtures

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: verophi-inttest/go.mod
          cache-dependency-path: verophi-inttest/go.sum

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: |
          docker pull "$VEROPHI_IMAGE"
          docker pull "$VEROPHI_TRIVY_IMAGE"

      - name: Drift verify (Gitlab/Github)
        working-directory: verophi-inttest
        env:
          VEROPHI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VEROPHI_GITLAB_TOKEN: ${{ secrets.VEROPHI_GITLAB_TOKEN }}
        run: make drift-all

      - name: Regenerate baseline (expectations + frozen SBOM)
        working-directory: verophi-devtools
        run: |
          go run ./tools/gen-expectations \
            --result ../verophi-inttest/out/results/gitlab.json \
            --out ../verophi-inttest/expectations.yaml
          cp ../verophi-inttest/out/sboms/sbom-frozen.json \
             ../verophi-inttest/testdata/sbom-frozen.json

      - name: Exact self-check (the new baseline must pass Layer 1)
        working-directory: verophi-inttest
        run: |
          go run ./tools/verify --expectations expectations.yaml --result out/results/github.json --mode exact
          go run ./tools/verify --expectations expectations.yaml --result out/results/gitlab.json --mode exact

      - name: Open or update baseline-refresh PR
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.ci_token.outputs.token }}
          sign-commits: true
          path: verophi-inttest
          branch: ci/baseline-refresh
          base: main
          title: "chore: refresh E2E baseline (frozen SBOM + expectations)"
          commit-message: ${{ inputs.pr-commit-message }}
          body: ${{ inputs.pr-body }}
          labels: |
            ci
            baseline-refresh
          delete-branch: false

      - name: Enable auto-merge on the baseline PR
        if: steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ steps.ci_token.outputs.token }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}" --repo verophi/verophi-inttest

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            verophi-inttest/out/results/github.json
            verophi-inttest/out/results/gitlab.json
            verophi-inttest/out/logs/
          retention-days: 30
          if-no-files-found: ignore
